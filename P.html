<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Plant Sheet</title>
<link rel="stylesheet" href="css/plantinfopagestyles.css" />
<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    padding: 20px;
}

.row2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px; /* space between blocks */
}
ķ
.block2 {
  padding: 20px;
}

.plant-info-values{
    font-size: 10px;
    font-family: Arial, sans-serif;
}

.button-row {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 10px; /* space between blocks */
}

.grid-size-icons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(1, 1fr);
  gap: 0px;
  justify-items: center; /* horizontal center */
  align-items: flex-end; /* on line bottom */
}

.cell-size-icons_r1 {
  padding: 0px;
  width: fit-content;
  height: fit-content;
  justify-items: center; /* horizontal center */
  align-items: flex-end; /* on line bottom */
}

.cell-size-icons_r2 {
  padding: 0px;
  width: fit-content;
  height: fit-content;
  justify-items: center; /* horizontal center */
  align-self: top;      /* vertical bottom */
}

.container {
    background: white;
    padding: 30px;
    max-width: 1100px;
    margin: auto;
    border: 1px solid #ccc;
}

h1 {
    font-size: 36px;
    margin-bottom: 20px;
}

.section {
    margin-bottom: 30px;
}

.row {
    display: flex;
    gap: 40px;
    margin-bottom: 10px;
}

label {
    font-weight: bold;
}

input[type="text"] {
    width: 250px;
    padding: 5px;
}

.checkbox-group {
    display: flex;
    gap: 30px;
    margin-top: 10px;
}

.planning-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

.planning-table th,
.planning-table td {
    border: 1px solid #999;
    text-align: center;
    padding: 6px;
    font-size: 12px;
}

.planning-table th:first-child,
.planning-table td:first-child {
    text-align: left;
    padding-left: 8px;
    width: 200px;

}

.varieties ul {
    margin-top: 10px;
}

button {
    padding: 10px 20px;
    font-size: 14px;
    cursor: pointer;
}

.back-button {
    margin-bottom: 20px;
}
.language-button {
    margin-bottom: 20px;
}


#box-g {
    background-color: #90EE90;
    padding: 8px 12px;
    border-radius: 4px;
    display: inline-block;
}

#box-y {
    background-color: #FFFF99;
    padding: 8px 12px;
    border-radius: 4px;
    display: inline-block;
}

#box-r {
    background-color: #FF6B6B;
    color: white;
    padding: 8px 12px;
    border-radius: 4px;
    display: inline-block;
}

#box-b {
    background-color: #333333;
    color: white;
    padding: 8px 12px;
    border-radius: 4px;
    display: inline-block;
}

.icons {
    display: flex;
    gap: 15px;
    align-items: center;
}

.plant-info-icons {
    width: 3em;
    height: 3em;
    fill:black;
}

.grid-size-info-icons {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: 0px;
  justify-items: center; /* horizontal center */
  align-items: flex-end; /* on line bottom */
}

.cell-size-info-icons {
  padding: 0px;
  width: fit-content;
  height: fit-content;
  justify-items: left; /* horizontal center */
  align-items: flex-end; /* on line bottom */
}

.leaf-harvest-icon { width:60px; height:60px; fill:currentColor; }
.leaf-harvest-icon.red  { color:red; }
.leaf-harvest-icon.green{ color:green; }
.leaf-harvest-icon.yellow{ color:gold; }
.leaf-harvest-icon.black{ color:black; }

.root-harvest-icon { width:70px; height:70px; fill:currentColor; }
.root-harvest-icon.red  { color:red; }
.root-harvest-icon.green{ color:green; }
.root-harvest-icon.yellow{ color:gold; }
.root-harvest-icon.black{ color:black; }

.stem-harvest-icon { width:60px; height:60px; fill:currentColor; }
.stem-harvest-icon.red  { color:red; }
.stem-harvest-icon.green{ color:green; }
.stem-harvest-icon.yellow{ color:gold; }
.stem-harvest-icon.black{ color:black; }

.fruit-harvest-icon { width:70px; height:70px; fill:currentColor; }
.fruit-harvest-icon.red  { color:red; }
.fruit-harvest-icon.green{ color:green; }
.fruit-harvest-icon.yellow{ color:gold; }
.fruit-harvest-icon.black{ color:black; }

.flower-harvest-icon { width:60px; height:60px; fill:currentColor; }
.flower-harvest-icon.red  { color:red; }
.flower-harvest-icon.green{ color:green; }
.flower-harvest-icon.yellow{ color:gold; }
.flower-harvest-icon.black{ color:black; }

.seed-harvest-icon { width:60px; height:60px; fill:currentColor; }
.seed-harvest-icon.red  { color:red; }
.seed-harvest-icon.green{ color:green; }
.seed-harvest-icon.yellow{ color:gold; }
.seed-harvest-icon.black{ color:black; }
 
.size-plant-icon-class { fill: var(--sizeObjColor)} /* width:60px; height:76px; */
.size-tree-icon { fill:var(--sizeObjColor); }  /* width:60px; height:72px; */
.size-bush-icon-class{ fill:var(--sizeObjColor); }  /* width:60px; height:57px; */
.size-human-icon-class { fill:var(--sizeObjColor); }/* width:60px; height:60px;  */
.size-house-icon-class { fill:var(--sizeObjColor); } /* width:60px; height:60px; */
.size-root-icon-class { fill:var(--sizeObjColor); } /* width:60px; height:52px; */

.flower-color-icon { width:60px; height:60px; color:black }
.temp-icons { width:60px; height:60px; color:black }


.resizedImagePlant{
  width:600px;
  height:auto;
}


.CALENDER1 {
    background: #dcdcdc;
    border: 1px solid #b5b5b5;
    padding: 6px;
}

.CALENDER1-months {
    display: grid;
    grid-template-columns: repeat(12, minmax(34px, 1fr));
    gap: 2px;
}

.CALENDER1-row {
    display: grid;
    grid-template-columns: repeat(48, minmax(8px, 1fr));
    gap: 2px;
}

.CALENDER1-month {
    font-size: 12px;
    text-align: center;
    background: #ececec;
    border: 1px solid #b7b7b7;
    padding: 2px 0;
}

.CALENDER1-row {
    margin-top: 3px;
}

.CALENDER1-cell {
    background: #e8e8e8;
    border: 1px solid #b7b7b7;
    min-height: 16px;
    aspect-ratio: 1 / 1;
    position: relative;
}

.CALENDER1-cell.active::after {
    content: "";
    position: absolute;
    inset: 1px;
    background: var(--CALENDER1-color, #444);
}

.CALENDER1-cell.month-end {
}

.CALENDER1-legend {
    display: grid;
    grid-template-columns: repeat(4, minmax(120px, 1fr));
    gap: 8px;
    margin-top: 8px;
}

.CALENDER1-legend-item {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: #ececec;
    border: 1px solid #c7c7c7;
    font-size: 13px;
    padding: 3px 6px;
}

.CALENDER1-legend-item .swatch {
    width: 14px;
    aspect-ratio: 1 / 1;
    margin-right: 6px;
    display: inline-block;
}


</style>
</head>
