<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plant Page</title>
    <link rel="stylesheet" href="css/homepagestyles.css" />
  </head>
  <body>
    <main class="landing-wrapper">
      <section class="card landing-card">
        <h1>Plant Page</h1>
        <p class="subtitle">Choose a plant and open its detailed view.</p>

        <label for="plant-selector">Plant name</label>
        <select id="plant-selector" aria-label="Select plant">
          <option value="">Loading plants…</option>
        </select>

        <label for="plant-selector-variety">Variety</label>
        <select id="plant-selector-variety" aria-label="Select plant variety">
          <option value="">Loading varieties…</option>
        </select>

        <button id="gennfc" type="button" disabled>Generate NFC</button>
        <p class="error-message" id="error-message" aria-live="polite"></p>
      </section>

         <div class="row">
            <div>
                <label>NR:</label>
                <input type="text" id="nr" style="width:500px;" readonly>
            </div>
        </div>
                 <div class="row">
            <div>
                <label>Year:</label>
                <input type="text" id="name_hu" style="width:500px;" readonly>
            </div>
        </div>
           <div class="row">
            <div>
                <label>Name:</label>
                <input type="text" id="name_hu" style="width:500px;" readonly>
            </div>
        </div>
         <div class="row">
            <div>
                <label>Variety:</label>
                <input type="text" id="variety" style="width:500px;" readonly>
            </div>
        </div>
         <div class="row">
            <div>
                <label>Latin Name:</label>
                <input type="text" id="latinname" style="width:500px;" readonly>
            </div>
        </div>
            <div>
                <label>Date:</label>
                <input type="text" id="datum" style="width:500px;" readonly>
            </div>
        </div>
                  <div>
                <label>NFC Typ:</label>
                <input type="text" id="nfctyp" style="width:500px;" readonly>
                    <!--  noveny / oltas  -->
            </div>
        </div>
                  <div>
                <label>Egyéb:</label>
                <input type="text" id="egyeb" style="width:500px;" readonly>
            </div>
        </div>

      <!--
      135/2024/Póréhagyma/Walky/Allium ampeloprasum/Edible/Zöldség//
      181/1994/Körte/Fehértói magonc/prunus communis/Edible/Fruit/oltóvessző/gyümölcs kemeny világos zöld augusztus vége édes savanykás, nagy , finom, kis növésű,  önmetsző
      -->
       <div class="section">
           <h3>NFC Link</h3>
        <p id="nfc-link">plant://0</p>
    </div>
    </main>

    <script src="scripts/generate.js" type="module"></script>
  </body>
</html>
