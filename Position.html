<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC Geo-Tool Pro (Live GPS)</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --dark: #333; --danger: #dc3545; }
        body { font-family: -apple-system, sans-serif; padding: 20px; line-height: 1.4; color: var(--dark); max-width: 500px; margin: auto; background: #f8f9fa; }
        h2 { text-align: center; color: var(--primary); margin-bottom: 10px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .data-line { display: flex; justify-content: space-between; margin: 5px 0; border-bottom: 1px solid #eee; padding-bottom: 4px; }
        .packet-zone { background: #e9ecef; padding: 10px; border-radius: 6px; word-break: break-all; font-family: monospace; margin: 5px 0; font-size: 14px; border: 1px solid #ccc; }
        .meta-info { font-size: 12px; color: #666; display: flex; justify-content: space-between; margin-bottom: 5px; }
        button { width: 100%; padding: 14px; margin: 8px 0; cursor: pointer; border-radius: 8px; border: none; font-size: 16px; font-weight: 600; }
        .btn-get { background: var(--dark); color: white; }
        .btn-stop { background: var(--danger); color: white; display: none; }
        .btn-write { background: var(--primary); color: white; }
        .btn-read { background: #6f42c1; color: white; }
        .badge { padding: 2px 6px; border-radius: 4px; font-size: 11px; background: #ddd; }
        #status { text-align: center; font-weight: bold; margin-top: 10px; padding: 10px; border-radius: 8px; transition: 0.3s; }
        .live-indicator { color: var(--success); animation: blink 1s infinite; font-weight: bold; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <h2>NFC Geo-Tool</h2>

    <div class="card">
        <strong>1. GPS Monitor</strong>
        <button id="startBtn" class="btn-get" onclick="startLiveCapture()">Start Live Tracking</button>
        <button id="stopBtn" class="btn-stop" onclick="stopLiveCapture()">Stop & Lock Data</button>
        
        <div class="data-line"><span>Latitude:</span> <span id="disp-lat">-</span></div>
        <div class="data-line"><span>Longitude:</span> <span id="disp-lon">-</span></div>
        <div class="data-line"><span>Altitude:</span> <span id="disp-alt">-</span></div>
        <div class="data-line"><span>Accuracy:</span> <span id="disp-acc">-</span></div>
        
        <div class="meta-info">
            <span id="update-timer">Status: Standing by</span>
            <span id="live-dot" style="display:none" class="live-indicator">● UPDATING</span>
        </div>
    </div>

    <div class="card">
        <div class="meta-info">
            <strong>2. Compressed Packet</strong>
            <span id="packet-size" class="badge">Size: 0 bytes</span>
        </div>
        <div class="packet-zone" id="packet-out">No data locked...</div>
        <button class="btn-write" id="writeBtn" disabled onclick="writeNFC()">Write to NTAG213</button>
    </div>

    <div class="card">
        <strong>3. Read & Verify</strong>
        <button class="btn-read" onclick="readNFC()">Scan Tag</button>
        <div id="read-display" style="display:none; margin-top:10px; border-top: 2px solid var(--primary); padding-top:10px;">
            <div class="data-line"><span>Found Lat:</span> <span id="read-lat"></span></div>
            <div class="data-line"><span>Found Lon:</span> <span id="read-lon"></span></div>
            <div class="data-line"><span>Found Alt:</span> <span id="read-alt"></span></div>
        </div>
    </div>

    <div id="status">Ready.</div>

    <script>
        let currentData = { lat: 0, lon: 0, alt: 0 };
        let lastUpdateTime = Date.now();
        let timerInterval;
        let watchId = null;

        function packBase64(lat, lon, alt) {
            const latInt = Math.round((lat + 90) * 1000000); 
            const lonInt = Math.round((lon + 180) * 1000000);
            const altInt = Math.round(alt + 1000);

            const buffer = new ArrayBuffer(10);
            const view = new DataView(buffer);
            view.setUint32(0, latInt); 
            view.setUint32(4, lonInt); 
            view.setUint16(8, altInt); 

            const bytes = new Uint8Array(buffer);
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
            return btoa(binary);
        }

        function unpackBase64(b64) {
            try {
                const binary = atob(b64);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                const view = new DataView(bytes.buffer);
                return {
                    lat: (view.getUint32(0) / 1000000 - 90).toFixed(6),
                    lon: (view.getUint32(4) / 1000000 - 180).toFixed(6),
                    alt: view.getUint16(8) - 1000
                };
            } catch (e) { return null; }
        }

        function startLiveCapture() {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            
            document.getElementById('startBtn').style.display = "none";
            document.getElementById('stopBtn').style.display = "block";
            document.getElementById('live-dot').style.display = "inline";
            setStatus("Fetching GPS satellites...", "orange");

            const options = { enableHighAccuracy: true, timeout: 30000, maximumAge: 0 };

            watchId = navigator.geolocation.watchPosition((pos) => {
                lastUpdateTime = Date.now();
                currentData.lat = pos.coords.latitude;
                currentData.lon = pos.coords.longitude;
                currentData.alt = pos.coords.altitude || 0;
                const acc = pos.coords.accuracy;

                document.getElementById('disp-lat').innerText = currentData.lat.toFixed(6);
                document.getElementById('disp-lon').innerText = currentData.lon.toFixed(6);
                document.getElementById('disp-alt').innerText = Math.round(currentData.alt) + "m";
                document.getElementById('disp-acc').innerText = Math.round(acc) + "m";

                const b64 = packBase64(currentData.lat, currentData.lon, currentData.alt);
                document.getElementById('packet-out').innerText = b64;
                document.getElementById('packet-size').innerText = `Size: ${b64.length} bytes`;
                
                document.getElementById('writeBtn').disabled = false;
                setStatus(`Updating... (${Math.round(acc)}m accuracy)`, "#0056b3");

            }, (err) => setStatus("GPS Error: " + err.message, "red"), options);

            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const seconds = Math.floor((Date.now() - lastUpdateTime) / 1000);
                document.getElementById('update-timer').innerText = `Last improvement: ${seconds}s ago`;
            }, 1000);
        }

        function stopLiveCapture() {
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }

            document.getElementById('startBtn').style.display = "block";
            document.getElementById('startBtn').innerText = "Restart Tracking";
            document.getElementById('stopBtn').style.display = "none";
            document.getElementById('live-dot').style.display = "none";
            document.getElementById('update-timer').innerText = "Status: Data Locked";
            
            setStatus("Tracking Stopped. Data preserved.", "#333");
        }

        async function writeNFC() {
            if (!('NDEFReader' in window)) return setStatus("NFC not supported", "red");
            const b64 = document.getElementById('packet-out').innerText;
            try {
                const ndef = new NDEFReader();
                setStatus("TAP NFC TAG NOW", "blue");
                await ndef.write({ records: [{ recordType: "text", data: b64 }] });
                setStatus("Successfully Written! ✅", "green");
            } catch (err) { setStatus("Write Error", "red"); }
        }

        async function readNFC() {
            if (!('NDEFReader' in window)) return setStatus("NFC not supported", "red");
            try {
                const ndef = new NDEFReader();
                await ndef.scan();
                setStatus("Ready to Read - Tap Tag", "blue");
                ndef.onreading = event => {
                    const decoder = new TextDecoder();
                    const b64 = decoder.decode(event.message.records[0].data);
                    const data = unpackBase64(b64);
                    if (data) {
                        document.getElementById('read-display').style.display = "block";
                        document.getElementById('read-lat').innerText = data.lat;
                        document.getElementById('read-lon').innerText = data.lon;
                        document.getElementById('read-alt').innerText = data.alt + "m";
                        setStatus("Tag Decoded!", "green");
                    }
                };
            } catch (err) { setStatus("Read Error", "red"); }
        }

        function setStatus(msg, color) {
            const s = document.getElementById('status');
            s.innerText = msg;
            s.style.background = color;
            s.style.color = "white";
        }
    </script>
</body>
</html>
