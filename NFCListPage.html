<!DOCTYPE html>
<html lang="en" data-i18n-title="page.title.nfcList">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NFC List</title>
    <link rel="icon" href="favicon.ico" />
    <link rel="stylesheet" href="css/plantlistpagestyles.css" />
    <style>
      .filter-bar {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }
      .dropdown-filter-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 12px;
      }
      .dropdown-filter-bar select {
        flex: 1 1 160px;
        min-width: 120px;
        padding: 6px 8px;
        border: 1px solid #aaa;
        border-radius: 4px;
        font-size: 0.9rem;
        background: #fff;
      }
      .nfc-list-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 8px;
        font-size: 0.95rem;
      }
      .nfc-list-table th {
        background: #4a7c4e;
        color: white;
        text-align: left;
        padding: 8px 10px;
        white-space: nowrap;
      }
      .nfc-list-table td {
        padding: 7px 10px;
        border-bottom: 1px solid #ddd;
        word-break: break-all;
      }
      .nfc-list-table tr:hover td {
        background: #f0f8f0;
      }
      .nfc-list-table tr:nth-child(even) td {
        background: #f9f9f9;
      }
      .nfc-list-table tr:nth-child(even):hover td {
        background: #f0f8f0;
      }
      .nfc-list-table a {
        color: #2f7d32;
        text-decoration: none;
      }
      .nfc-list-table a:hover {
        text-decoration: underline;
      }
      .back-button {
        margin-bottom: 0;
      }
      @media (max-width: 600px) {
        .nfc-list-table {
          font-size: 0.8rem;
        }
        .nfc-list-table th,
        .nfc-list-table td {
          padding: 5px 6px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Language switcher -->
    <div class="lang-switcher">
      <button class="lang-btn" data-lang="hu" type="button">HU</button>
      <button class="lang-btn" data-lang="en" type="button">EN</button>
    </div>

    <main class="landing-wrapper">
      <section class="card landing-card" style="width: min(1400px, 96vw);">
        <div class="filter-bar">
          <button id="back-button" class="back-button" type="button" data-i18n="nfc.btn.back">← Back</button>
          <h1 style="margin:0; font-size:1.4rem;" data-i18n="nfc.title">NFC List</h1>
        </div>
        <div class="dropdown-filter-bar">
          <select id="dd-nfc-id"></select>
          <select id="dd-plant-id"></select>
          <select id="dd-family"></select>
          <select id="dd-genus"></select>
          <select id="dd-latin"></select>
          <select id="dd-variety"></select>
        </div>
        <div style="overflow-x: auto;">
          <table class="nfc-list-table">
            <thead>
              <tr>
                <th data-i18n="nfc.table.id">ID</th>
                <th data-i18n="nfc.table.nfcText">NFC Text</th>
                <th data-i18n="nfc.table.link">Link</th>
                <th data-i18n="nfc.table.plantId">Plant ID</th>
                <th data-i18n="nfc.table.created">Created</th>
                <th data-i18n="nfc.table.datum">Datum</th>
                <th data-i18n="nfc.table.location">Location</th>
                <th data-i18n="nfc.table.gpsCoordinates">GPS Coordinates</th>
                <th data-i18n="nfc.table.altitude">Altitude</th>
              </tr>
            </thead>
            <tbody id="nfc-list-body">
              <tr><td colspan="9" data-i18n="nfc.loading">Loading…</td></tr>
            </tbody>
          </table>
        </div>
        <p class="error-message" id="error-message" aria-live="polite"></p>
      </section>
    </main>
    <script src="scripts/nfc-listing.js" type="module"></script>
  </body>
</html>
