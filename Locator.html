<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC Geo-Writer</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; max-width: 500px; margin: auto; text-align: center; }
        .data-box { background: #f4f4f4; padding: 15px; border-radius: 8px; margin: 20px 0; text-align: left; }
        button { width: 100%; padding: 12px; margin: 5px 0; cursor: pointer; border-radius: 5px; border: none; font-size: 16px; }
        #captureBtn { background: #28a745; color: white; }
        #writeBtn { background: #007bff; color: white; display: none; }
        .success { color: green; font-weight: bold; }
    </style>
</head>
<body>

    <h2>NFC Geo-Stamper</h2>
    
    <button id="captureBtn">1. Get Location & Elevation</button>

    <div class="data-box" id="display">
        <strong>Lat:</strong> <span id="lat">-</span><br>
        <strong>Lon:</strong> <span id="lon">-</span><br>
        <strong>Alt:</strong> <span id="alt">-</span><br>
        <strong>Final Packet:</strong> <code id="packet">-</code>
    </div>

    <button id="writeBtn">2. Write Packet to NFC</button>
    <p id="status"></p>

    <script>
        let nfcPacket = "";

        // --- STEP 1: CAPTURE GEOLOCATION ---
        document.getElementById('captureBtn').addEventListener('click', () => {
            if (!navigator.geolocation) {
                alert("Geolocation is not supported by your browser.");
                return;
            }

            const options = { enableHighAccuracy: true };

            navigator.geolocation.getCurrentPosition((position) => {
                const lat = position.coords.latitude.toFixed(5);
                const lon = position.coords.longitude.toFixed(5);
                const alt = position.coords.altitude ? Math.round(position.coords.altitude) : "0";

                // Update UI
                document.getElementById('lat').innerText = lat;
                document.getElementById('lon').innerText = lon;
                document.getElementById('alt').innerText = alt + "m";

                // Create Minimized Packet (Format: lat,lon,alt)
                nfcPacket = `${lat},${lon},${alt}m`;
                document.getElementById('packet').innerText = nfcPacket;

                // Show the Write button
                document.getElementById('writeBtn').style.display = "block";
            }, (err) => {
                alert("Error getting location: " + err.message);
            }, options);
        });

        // --- STEP 2: WRITE TO NFC (SAMSUNG/CHROME) ---
        document.getElementById('writeBtn').addEventListener('click', async () => {
            if (!('NDEFReader' in window)) {
                alert("Web NFC not supported. Use Chrome on Android.");
                return;
            }

            try {
                const ndef = new NDEFReader();
                document.getElementById('status').innerText = "Approach tag now...";
                
                await ndef.write({
                    records: [{ recordType: "text", data: nfcPacket }]
                });

                document.getElementById('status').innerHTML = "<span class='success'>Data Written Successfully!</span>";
            } catch (error) {
                document.getElementById('status').innerText = "Write failed: " + error;
            }
        });
    </script>
</body>
</html>
