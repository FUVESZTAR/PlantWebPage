<!DOCTYPE html>
<html lang="en" data-i18n-title="page.title.plantpage">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plant Page</title>
    <!-- V8 2026-03-24 -->
    <link rel="icon" href="favicon.ico" />
    <link rel="stylesheet" href="css/plantpagepagestyles.css" />
    <style>
  .nfc-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin: 0 auto;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .form-group label {
      font-weight: bold;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 0.5rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }
    .button-group {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }
      7

html, body {
    cursor: url("leaf.ico"), default;
    /* just change the cursor.ico path to your location */
}
  </style>
  </head>
  <body>
    <!-- Language switcher -->
    <div class="lang-switcher">
      <button class="lang-btn" data-lang="hu" type="button">HU</button>
      <button class="lang-btn" data-lang="en" type="button">EN</button>
    </div>

    <main class="landing-wrapper">
      <section class="card landing-card">
        <h1 data-i18n="plantpage.heading">Plant Page</h1>
        <p class="subtitle" data-i18n="plantpage.subtitle">Choose a plant and open its detailed view.</p>
        <div class="nfc-form">
           <div class="form-group">
              <label for="plant-selector" data-i18n="plantpage.label.plantName">Plant name</label>
              <select id="plant-selector" aria-label="Select plant">
                  <option value="" data-i18n="plantpage.placeholder.loadingPlants">Loading plants…</option>
              </select>
           </div>
           <div class="form-group">
              <label for="plant-selector-variety" data-i18n="plantpage.label.variety">Variety</label>
              <select id="plant-selector-variety" aria-label="Select plant variety">
                <option value="" data-i18n="plantpage.placeholder.loadingVarieties">Loading varieties…</option>
              </select>
           </div>
           <div class="button-group">
              <button id="open-view" type="button" disabled data-i18n="plantpage.btn.openView">Open Plant View</button>
              <button id="nfc-button" type="button" data-i18n="plantpage.btn.nfcGenerator">NFC Generator</button>
           </div>
        </div>
        <p class="subtitle" data-i18n="plantpage.subtitle.lists">Lists</p>
        <div class="nfc-form">
            <div class="button-group">
              <button id="plant-list-btn" type="button" disabled data-i18n="plantpage.btn.openList">Open Plant List</button>
              <p class="error-message" id="error-message" aria-live="polite"></p>
            </div>
            <div class="button-group">
              <button id="nfc-list-btn" type="button" data-i18n="plantpage.btn.nfcList">NFC List</button>
              <p class="error-message" id="error-message" aria-live="polite"></p>
            </div>
          </div>
      </section>
    </main>

    <script src="scripts/plantpage.js" type="module"></script>
  </body>
</html>
