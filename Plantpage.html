<!DOCTYPE html>
<html lang="en" data-i18n-title="page.title.plantpage">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plant Page</title>
    <!-- V9 2026-04-07 -->
    <link rel="icon" href="favicon.ico" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
    <style>
/* ── Design tokens ──────────────────────────────────────────── */
:root {
  --green:       #2f7d32;
  --green-mid:   #388e3c;
  --green-light: #4caf50;
  --green-pale:  #e8f5e9;
  --green-pale2: #c8e6c9;
  --muted:       #546354;
  --charcoal:    #172217;
  --bg:          #f5f8f3;
  --card:        #ffffff;
  --border:      rgba(47,125,50,.15);
  --shadow:      0 4px 24px rgba(23,34,23,.08);
  --shadow-lg:   0 12px 48px rgba(23,34,23,.14);
  --radius:      18px;
  --radius-sm:   10px;
  --tr:          .22s cubic-bezier(.4,0,.2,1);
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body {
  font-family:'DM Sans',sans-serif;
  background: radial-gradient(circle at top right,#dff0d8 0,var(--bg) 45%);
  color: var(--charcoal);
  line-height: 1.6;
  min-height: 100vh;
  cursor: url('leaf.cur') 0 0, auto;
}

/* ── Layout wrapper ─────────────────────────────────────────── */
.page-wrapper {
  width: min(620px, 96vw);
  margin: 0 auto;
  padding: 1rem 0 3rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

/* ── Page header ────────────────────────────────────────────── */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.6rem 0;
  gap: 0.5rem;
  flex-wrap: wrap;
}
.page-header-left { display:flex; flex-direction:column; gap:2px; }
.page-title {
  font-family:'Playfair Display',serif;
  font-size: clamp(1.4rem,4vw,1.9rem);
  font-weight: 700;
  color: var(--green);
  line-height: 1.1;
}
.page-subtitle { font-size:.82rem; color:var(--muted); font-weight:300; }

/* ── Language switcher ──────────────────────────────────────── */
.lang-toggle {
  display: flex;
  background: var(--green-pale2);
  border-radius: 20px;
  padding: 3px;
  gap: 2px;
  flex-shrink: 0;
}
.lang-btn {
  padding: 5px 14px;
  border-radius: 16px;
  font-size: .78rem;
  font-weight: 600;
  border: none;
  background: transparent;
  color: var(--green-mid);
  cursor: pointer;
  transition: all var(--tr);
  letter-spacing:.04em;
  width: auto;
}
.lang-btn.active { background:var(--green); color:#fff; }
.lang-btn:hover:not(.active) { background:rgba(47,125,50,.12); }

/* ── Panel ──────────────────────────────────────────────────── */
.panel {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: box-shadow var(--tr);
}
.panel:hover { box-shadow: var(--shadow-lg); }

.panel-header {
  display: flex;
  align-items: center;
  padding: 16px 20px 12px;
  gap: 10px;
}
.panel-header-left { display:flex; align-items:center; gap:9px; }
.panel-icon { font-size:1.2rem; flex-shrink:0; }
.panel-title {
  font-family:'Playfair Display',serif;
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--green);
}
.panel-subtitle {
  font-size: .73rem;
  color: var(--muted);
  font-weight: 300;
  margin-top: 1px;
}
.panel-body-pad { padding: 0 20px 20px; display:flex; flex-direction:column; gap:14px; }

/* ── Form elements ──────────────────────────────────────────── */
.form-group { display:flex; flex-direction:column; gap:5px; }
.form-group label {
  font-size: .79rem;
  font-weight: 500;
  color: var(--charcoal);
}
.form-group select {
  padding: 9px 12px;
  font-size: .92rem;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--green-pale);
  color: var(--charcoal);
  font-family: 'DM Sans',sans-serif;
  outline: none;
  transition: border-color var(--tr), background var(--tr);
  width: 100%;
}
.form-group select:focus { border-color:var(--green-mid); background:#fff; }

/* ── Buttons ────────────────────────────────────────────────── */
.btn-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 9px;
}
button.btn-primary,
button.btn-secondary {
  padding: .75rem 1rem;
  font-size: .92rem;
  font-family:'DM Sans',sans-serif;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-weight: 500;
  transition: transform .15s, background var(--tr);
  width: 100%;
}
button.btn-primary { background:var(--green); color:#fff; }
button.btn-primary:hover:not(:disabled) { background:var(--green-mid); transform:translateY(-1px); }
button.btn-secondary {
  background: var(--green-pale2);
  color: var(--green);
  border: 1px solid var(--border);
}
button.btn-secondary:hover:not(:disabled) { background:var(--green-pale); }
button:disabled { opacity:.55; cursor:not-allowed; }

/* ── Status / error message ─────────────────────────────────── */
.status-msg {
  font-size: .83rem;
  min-height: 1.2em;
  padding: 4px 0;
  text-align: center;
  font-weight: 500;
  color: #c62828;
}

/* ── Responsive ─────────────────────────────────────────────── */
@media(max-width:480px) {
  .panel-header { padding:14px 15px 10px; }
  .panel-body-pad { padding:0 15px 16px; }
  .btn-grid { grid-template-columns:1fr; }
}
    </style>
  </head>
  <body>
    <main class="page-wrapper">

      <!-- Page header -->
      <div class="page-header">
        <div class="page-header-left">
          <div class="page-title">🌿 <span data-i18n="plantpage.heading">Plant Page</span></div>
          <div class="page-subtitle" data-i18n="plantpage.subtitle">Choose a plant and open its detailed view.</div>
        </div>
        <div class="lang-toggle">
          <button class="lang-btn" data-lang="hu" type="button">HU</button>
          <button class="lang-btn" data-lang="en" type="button">EN</button>
        </div>
      </div>

      <!-- Status / error message -->
      <p class="status-msg" id="error-message" aria-live="polite"></p>

      <!-- ── Panel: Plant Selection ──────────────────────────── -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-header-left">
            <span class="panel-icon">🌱</span>
            <div>
              <div class="panel-title" data-i18n="plantpage.panel.selection.title">Selection</div>
              <div class="panel-subtitle" data-i18n="plantpage.panel.selection.subtitle">Choose a plant and variety.</div>
            </div>
          </div>
        </div>
        <div class="panel-body-pad">
          <div class="form-group">
            <label for="plant-selector" data-i18n="plantpage.label.plantName">Plant name</label>
            <select id="plant-selector" aria-label="Select plant">
              <option value="" data-i18n="plantpage.placeholder.loadingPlants">Loading plants…</option>
            </select>
          </div>
          <div class="form-group">
            <label for="plant-selector-variety" data-i18n="plantpage.label.variety">Variety</label>
            <select id="plant-selector-variety" aria-label="Select plant variety">
              <option value="" data-i18n="plantpage.placeholder.loadingVarieties">Loading varieties…</option>
            </select>
          </div>
          <div class="btn-grid">
            <button id="open-view" class="btn-primary" type="button" disabled data-i18n="plantpage.btn.openView">Open Plant View</button>
            <button id="nfc-button" class="btn-secondary" type="button" data-i18n="plantpage.btn.nfcGenerator">NFC Generator</button>
          </div>
        </div>
      </div>

      <!-- ── Panel: Lists ────────────────────────────────────── -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-header-left">
            <span class="panel-icon">📋</span>
            <div>
              <div class="panel-title" data-i18n="plantpage.subtitle.lists">Lists</div>
            </div>
          </div>
        </div>
        <div class="panel-body-pad">
          <div class="btn-grid">
            <button id="plant-list-btn" class="btn-secondary" type="button" disabled data-i18n="plantpage.btn.openList">Open Plant List</button>
            <button id="nfc-list-btn" class="btn-secondary" type="button" data-i18n="plantpage.btn.nfcList">NFC List</button>
          </div>
        </div>
      </div>

    </main>

    <script src="scripts/plantpage.js" type="module"></script>
  </body>
</html>
